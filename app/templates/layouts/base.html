<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f5f6fa;
        }

        .navbar-brand{
            font-weight:600;
        }

        .card{
            border:none;
            border-radius:12px;
        }

        .table{
            background:white;
        }

        .table td{
white-space:nowrap;
}

.badge{
font-size:0.85rem;
}

.card{
border-radius:10px;
}

    </style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">

    <div class="container">

        <a class="navbar-brand" href="/dashboard">
            Sistem Absensi NFC
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#menu">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/kelas">Kelas</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/siswa">Data Siswa</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/register">Registrasi Kartu</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/log">Log Absensi</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/pengaturan">Pengaturan</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/device">Device</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link text-danger" href="/logout">Logout</a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<!-- Bootstrap JS (WAJIB untuk modal, dropdown, collapse) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
