{% extends "layouts/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="row g-3">

    <!-- KELAS -->
    <div class="col-6 col-md-3">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-building mb-2" style="font-size: 1.6rem;"></i>
                <div class="text-muted small">Kelas</div>
                <h4 id="total_kelas">{{ total_kelas }}</h4>
            </div>
        </div>
    </div>

    <!-- SISWA -->
    <div class="col-6 col-md-3">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-people mb-2" style="font-size: 1.6rem;"></i>
                <div class="text-muted small">Siswa</div>
                <h4 id="total_siswa">{{ total_siswa }}</h4>
            </div>
        </div>
    </div>

    <!-- HADIR -->
    <div class="col-6 col-md-3">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-check-circle text-success mb-2" style="font-size: 1.6rem;"></i>
                <div class="text-muted small">Hadir</div>
                <h4 id="hadir">{{ hadir }}</h4>
                <small id="telat_info"></small>
            </div>
        </div>
    </div>

    <!-- SAKIT -->
    <div class="col-6 col-md-3">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-heart-pulse text-warning mb-2" style="font-size: 1.6rem;"></i>
                <div class="text-muted small">Sakit</div>
                <h4 id="sakit">{{ sakit }}</h4>
            </div>
        </div>
    </div>

    <!-- IZIN -->
    <div class="col-6 col-md-3">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-envelope text-primary mb-2" style="font-size: 1.6rem;"></i>
                <div class="text-muted small">Izin</div>
                <h4 id="izin">{{ izin }}</h4>
            </div>
        </div>
    </div>

    <!-- ALFA -->
    <div class="col-6 col-md-3">
        <div class="card shadow-sm border-0">
            <div class="card-body text-center">
                <i class="bi bi-x-circle text-danger mb-2" style="font-size: 1.6rem;"></i>
                <div class="text-muted small">Alfa</div>
                <h4 id="alfa">{{ alfa }}</h4>
            </div>
        </div>
    </div>

</div>

<hr>

<!-- CHART -->
<div class="card shadow-sm border-0 mt-3">
    <div class="card-body text-center">
        <h6 class="mb-3">Statistik Absensi Hari Ini</h6>

        <div style="max-width:300px; margin:auto;">
            <canvas id="chartAbsensi"></canvas>
        </div>
    </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ==========================
// INIT CHART
// ==========================
const ctx = document.getElementById('chartAbsensi');

let chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['Hadir', 'Sakit', 'Izin', 'Alfa'],
        datasets: [{
            data: [
                {{ hadir | default(0) }},
                {{ sakit | default(0) }},
                {{ izin | default(0) }},
                {{ alfa | default(0) }}
            ],
            backgroundColor: [
                '#198754',
                '#ffc107',
                '#0d6efd',
                '#dc3545'
            ],
            borderWidth: 0
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: true,
        cutout: '70%',
        plugins: {
            legend: {
                position: 'bottom'
            }
        }
    }
});


// ==========================
// AJAX LOAD DATA
// ==========================
function loadDashboard() {
    fetch('/dashboard/data')
        .then(res => res.json())
        .then(data => {

            // update angka
            document.getElementById('total_kelas').innerText = data.kelas;
            document.getElementById('total_siswa').innerText = data.siswa;
            document.getElementById('hadir').innerText = data.hadir;
            document.getElementById('sakit').innerText = data.sakit;
            document.getElementById('izin').innerText = data.izin;
            document.getElementById('alfa').innerText = data.alfa;

            // telat
            const telatEl = document.getElementById('telat_info');
            if (data.telat > 0) {
                telatEl.innerText = `(Termasuk ${data.telat} telat)`;
                telatEl.className = "text-warning";
            } else {
                telatEl.innerText = "";
            }

            // update chart
            chart.data.datasets[0].data = [
                data.hadir,
                data.sakit,
                data.izin,
                data.alfa
            ];
            chart.update();

        })
        .catch(err => console.log("Error:", err));
}


// ==========================
// AUTO REFRESH (RINGAN)
// ==========================
document.addEventListener("DOMContentLoaded", () => {

    loadDashboard(); // load pertama

    // 🔥 interval aman (tidak berat)
    setInterval(loadDashboard, 10000); // 10 detik
});
</script>

{% endblock %}
