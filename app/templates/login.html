<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background: #f5f6fa;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        width: 100%;
        max-width: 340px;
        background: #fff;
        border-radius: 10px;
        padding: 30px 26px;
        box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    }

    .title {
        font-size: 20px;
        font-weight: 600;
        text-align: center;
        margin-bottom: 6px;
        color: #212529;
    }

    .subtitle {
        font-size: 12px;
        text-align: center;
        color: #888;
        margin-bottom: 22px;
    }

    .form-label {
        font-size: 12px;
        color: #555;
        margin-bottom: 4px;
    }

    .form-control {
        border-radius: 6px;
        font-size: 14px;
        padding: 9px 10px;
        border: 1px solid #ddd;
    }

    .form-control:focus {
        box-shadow: none;
        border-color: #212529;
    }

    .btn-login {
        margin-top: 10px;
        border-radius: 6px;
        font-size: 14px;
        padding: 10px;
        font-weight: 500;
    }

    .forgot {
        font-size: 12px;
        text-align: right;
        margin-top: 6px;
        margin-bottom: 10px;
    }

    .forgot a {
        text-decoration: none;
        color: #212529;
    }

    .forgot a:hover {
        text-decoration: underline;
    }

</style>

</head>

<body>

<div class="wrapper">

    <div class="login-card">

        <div class="title">Login</div>


        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-2">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>



            <button class="btn btn-dark w-100 btn-login">Login</button>

        </form>

        {% if error %}
        <div class="alert alert-danger mt-3 text-center">
            {{ error }}
        </div>
        {% endif %}

    </div>

</div>

</body>

</html>
